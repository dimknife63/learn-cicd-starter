name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      # 1. Build the binary so it includes the latest changes
      - name: Build app
        run: |
          go build -o notely .
          
      # 2. Build the Docker image (Assuming you have a step for this)
      # If you don't have a step that runs 'docker build', your image never updates!
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        
      # 3. Deploy
      - name: Deploy to Cloud Run
        run: |
          # If you aren't using a separate docker build step, 
          # gcloud builds submit will build the image for you
          gcloud builds submit --tag us-central1-docker.pkg.dev/notely-499314/notely-ar-repo/notely:latest .
          gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-499314/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-499314 --max-instances=4